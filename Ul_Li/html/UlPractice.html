<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Shop</title>
    <link rel="stylesheet" href="Uldes.css">
</head>
<body>
<header class="flower-border-img">
    <h1>Welcome to My Flower Shop</h1>
</header>
<main class="shop-main">

    <ul class="mainUl">
        <li class="mainLi">
            <ul class="secondUl">
                <li class="secondLi item-pic"> 
                    <img class="pictureFlower" src="talia.jpg" alt="Pink Rose"> 
                    <span class="spans">Pink Rose</span>
                </li>
               
                <li class="secondLi item-feature"> 
                    <h3>KEY FEATURE</h3>
                    <div class="progress">
                        <progress max="10" value="7"></progress>
                        <span>7/10 🌸</span>
                    </div>
                </li>

                <li class="secondLi item-rating">
                    <div class="starBox">
                        <span class="star">&#9733;</span>
                        <span class="star">&#9733;</span>
                        <span class="star">&#9733;</span>
                        <span class="star">&#9733;</span>
                        <span class="star">&#9734;</span>
                    </div>
                    <div class="rating-numbers">
                        <b>4.1</b>
                        <b>(11)</b>
                    </div>
                </li>

                <li class="secondLi item-btn"> 
                    <button class="modern-btn">visit</button>
                </li>
            </ul>
        </li>
    </ul>

    <ul class="mainUl">
        <li class="mainLi">
            <ul class="secondUl">
                <li class="secondLi item-pic"> 
                    <img class="pictureFlower" src="talia.jpg" alt="Pink Rose"> 
                    <span class="spans">Pink Rose</span>
                </li>
               
                <li class="secondLi item-feature"> 
                    <h3>KEY FEATURE</h3>
                    <div class="progress">
                        <progress max="10" value="7"></progress>
                        <span>7/10 🌸</span>
                    </div>
                </li>

                <li class="secondLi item-rating">
                    <div class="starBox">
                        <span class="star">&#9733;</span>
                        <span class="star">&#9733;</span>
                        <span class="star">&#9733;</span>
                        <span class="star">&#9733;</span>
                        <span class="star">&#9734;</span>
                    </div>
                    <div class="rating-numbers">
                        <b>4.1</b>
                        <b>(11)</b>
                    </div>
                </li>

                <li class="secondLi item-btn"> 
                    <button class="modern-btn">visit</button>
                </li>
            </ul>
        </li>
    </ul>

</main>
</body>
</html>
